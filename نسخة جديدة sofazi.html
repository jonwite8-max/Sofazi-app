<script>
// ================== SERVICE WORKER (PWA) ==================
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register("data:application/javascript," + encodeURIComponent(`
        self.addEventListener('install', (e) => { e.waitUntil(self.skipWaiting()); });
        self.addEventListener('activate', (e) => { e.waitUntil(self.clients.claim()); });
        self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
    `)).catch(() => {});
}

// ================== FIREBASE ==================
let db, auth;
let firebaseInitialized = false;
let currentUser = null;
let invoiceItems = [];

// ================== UTILITIES ==================
function toCents(amount) { return Math.round(amount * 100); }
function fromCents(cents) { return cents / 100; }
function formatCurrency(amount) { return new Intl.NumberFormat('ar-DZ', { style: 'currency', currency: 'DZD' }).format(fromCents(amount)); }
function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
function generateUUID() { return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => (c === 'x' ? (Math.random() * 16 | 0) : (Math.random() * 4 | 8)).toString(16)); }

function showToast(message, type = 'info') {
    const toast = document.createElement('div'); toast.className = 'alert-toast';
    let icon = 'fa-info-circle'; if (type === 'success') icon = 'fa-check-circle'; if (type === 'error') icon = 'fa-exclamation-triangle';
    toast.innerHTML = `<i class="fas ${icon}"></i> ${escapeHtml(message)}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 5000);
}

let loadingCount = 0;
function showLoading() { loadingCount++; let ov = document.getElementById('loadingOverlay'); if(!ov) { ov = document.createElement('div'); ov.id = 'loadingOverlay'; ov.className = 'loading-overlay'; ov.innerHTML = '<div class="spinner-border text-light"></div>'; document.body.appendChild(ov); } ov.style.display = 'flex'; }
function hideLoading() { loadingCount--; if(loadingCount <= 0) { const ov = document.getElementById('loadingOverlay'); if(ov) ov.style.display = 'none'; loadingCount = 0; } }

// ================== FIRESTORE WRAPPERS ==================
async function getStore(collectionName) {
    if (!firebaseInitialized) return [];
    const snapshot = await db.collection(collectionName).where("userId", "in", [currentUser?.uid || "all", "shared"]).get();
    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
}
async function saveStore(collectionName, dataArray) {
    if (!firebaseInitialized) return;
    const batch = db.batch();
    const existing = await db.collection(collectionName).where("userId", "==", currentUser.uid).get();
    existing.forEach(doc => batch.delete(doc.ref));
    dataArray.forEach(item => {
        const ref = db.collection(collectionName).doc(item.id || generateUUID());
        batch.set(ref, { ...item, userId: currentUser.uid, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    });
    await batch.commit();
}

// ================== INIT DEFAULT ==================
async function initDefaultData() {
    if (!firebaseInitialized) return;
    const settingsSnap = await db.collection('settings').where("userId", "==", currentUser.uid).get();
    if (settingsSnap.empty) {
        const defaultSettings = { id: 'settings', darkMode: false, invoiceCounter: 1, companyNameAr: 'سوفازي اندستري', companyNameFr: 'SOUAZI INDUSTRY', legalForm: 'SARL', capital: '100,000 DA', companyNif: '123456789012345', companyNis: '123456789012345', companyRc: '21 B 1234567', companyArt: '123456789012345', companyPhone: '0550 12 34 56', companyEmail: 'contact@souazi.dz', companyAddr: '20, Rue des Frères Bouadou, Alger, Algérie' };
        await db.collection('settings').doc(defaultSettings.id).set({ ...defaultSettings, userId: currentUser.uid });
    }
    const catSnap = await db.collection('expense_categories').where("userId", "==", currentUser.uid).get();
    if (catSnap.empty) {
        const cats = [
            { id: generateUUID(), name: 'إيجار', color: '#dc2626', description: 'إيجار المحل' },
            { id: generateUUID(), name: 'كهرباء', color: '#f59e0b', description: 'فواتير الكهرباء' },
            { id: generateUUID(), name: 'رواتب', color: '#10b981', description: 'رواتب الموظفين' },
            { id: generateUUID(), name: 'أدوات', color: '#3b82f6', description: 'أدوات ومعدات' },
            { id: generateUUID(), name: 'ديون ورشة', color: '#8b5cf6', description: 'ديون ورشة' }
        ];
        const batch = db.batch();
        cats.forEach(c => { const ref = db.collection('expense_categories').doc(c.id); batch.set(ref, { ...c, userId: currentUser.uid }); });
        await batch.commit();
    }
}

// ================== AUTH ==================
async function doLogin(email, password) {
    showLoading();
    try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        currentUser = cred.user;
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        let role = 'partner';
        let fullName = currentUser.email.split('@')[0];
        if (userDoc.exists) { role = userDoc.data().role; fullName = userDoc.data().full_name || fullName; }
        else {
            const usersCount = (await db.collection('users').get()).size;
            role = usersCount === 0 ? 'admin' : 'partner';
            await db.collection('users').doc(currentUser.uid).set({ id: currentUser.uid, email: currentUser.email, full_name: fullName, role, is_active: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        }
        document.getElementById('userNameDisplay').innerText = fullName;
        document.getElementById('userRoleDisplay').innerText = role === 'admin' ? 'مدير' : 'شريك';
        document.body.classList.remove('login-active');
        await initDefaultData();
        updateTopBarCompanyName();
        loadPage('dashboard');
        showToast(`مرحباً ${fullName}`, 'success');
    } catch(err) { showToast(err.message, 'error'); } finally { hideLoading(); }
}
function logout() { auth.signOut(); currentUser = null; document.body.classList.add('login-active'); showLogin(); document.getElementById('sidebar').classList.remove('open'); }
async function restoreSession() {
    return new Promise((resolve) => {
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await db.collection('users').doc(user.uid).get();
                const fullName = userDoc.exists ? userDoc.data().full_name : user.email.split('@')[0];
                document.getElementById('userNameDisplay').innerText = fullName;
                document.getElementById('userRoleDisplay').innerText = userDoc.exists && userDoc.data().role === 'admin' ? 'مدير' : 'شريك';
                document.body.classList.remove('login-active');
                updateTopBarCompanyName();
                loadPage('dashboard');
                resolve(true);
            } else {
                document.body.classList.add('login-active');
                showLogin();
                resolve(false);
            }
        });
    });
}
function showLogin() {
    document.getElementById('content').innerHTML = `
        <div class="login-container"><div class="card login-card"><div class="card-body p-5">
            <div class="text-center mb-4"><i class="fas fa-industry fa-4x text-primary mb-3"></i><h3 class="fw-bold">سوفازي إندستري</h3><p class="text-muted">نظام إدارة متكامل - سحابي</p></div>
            <div class="mb-3"><label class="form-label">البريد الإلكتروني</label><input type="email" id="loginUser" class="form-control form-control-lg" placeholder="example@company.com"></div>
            <div class="mb-4"><label class="form-label">كلمة المرور</label><input type="password" id="loginPass" class="form-control form-control-lg" placeholder="********"></div>
            <button class="btn btn-primary btn-lg w-100 py-2" id="loginBtn"><i class="fas fa-sign-in-alt me-2"></i> دخول</button>
            <p class="mt-3 small text-muted">أول مستخدم: admin@example.com / admin123</p>
        </div></div></div>
    `;
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginUser').value;
        const pass = document.getElementById('loginPass').value;
        if (email && pass) doLogin(email, pass); else showToast('الرجاء إدخال البريد وكلمة المرور', 'error');
    });
    document.getElementById('loginPass').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
}

// ================== UPDATE CUSTOMER TOTALS ==================
async function updateCustomerTotals(customerId) {
    const invoices = await getStore('invoices');
    const customerInvoices = invoices.filter(inv => inv.customer_id === customerId);
    const totalAmount = customerInvoices.reduce((sum, inv) => sum + inv.total_amount, 0);
    const paidAmount = customerInvoices.reduce((sum, inv) => sum + inv.paid_amount, 0);
    const customers = await getStore('customers');
    const custIndex = customers.findIndex(c => c.id == customerId);
    if (custIndex !== -1) {
        customers[custIndex].total_amount = totalAmount;
        customers[custIndex].paid_amount = paidAmount;
        customers[custIndex].updated_at = new Date().toISOString();
        await saveStore('customers', customers);
    }
}

// ================== CUSTOMERS (كامل) ==================
async function renderCustomers(page = 1, limit = 10) {
    showLoading();
    try {
        let customers = await getStore('customers');
        if (currentUser.role !== 'admin') customers = customers.filter(c => c.created_by === currentUser.uid);
        const total = customers.length, totalPages = Math.ceil(total/limit);
        const paginated = customers.slice((page-1)*limit, page*limit);
        document.getElementById('content').innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-4"><h4><i class="fas fa-users"></i> الزبائن</h4><button class="btn btn-primary" onclick="window.showCustomerModal()"><i class="fas fa-plus"></i> زبون جديد</button></div>
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchCustomer" class="form-control" placeholder="ابحث بالاسم أو الهاتف..."></div>
            <div class="row" id="customersList">${paginated.map(c => `
                <div class="col-md-4 mb-3"><div class="card h-100"><div class="card-body"><h5>${escapeHtml(c.name)}</h5>
                <p><i class="fas fa-phone"></i> ${escapeHtml(c.phone||'-')}<br><i class="fas fa-map-marker-alt"></i> ${escapeHtml(c.wilaya||'')} ${escapeHtml(c.address||'')}<br>
                <strong>المبلغ الكلي:</strong> ${formatCurrency(c.total_amount)}<br><strong>المدفوع:</strong> ${formatCurrency(c.paid_amount)}<br>
                <strong class="text-danger">المتبقي:</strong> ${formatCurrency(c.total_amount - c.paid_amount)}</p>
                <button class="btn btn-sm btn-primary" onclick="window.viewCustomer('${c.id}')">عرض</button>
                <button class="btn btn-sm btn-info" onclick="window.showCustomerPayments('${c.id}')">الدفعات</button>
                ${(currentUser.role === 'admin' || c.created_by === currentUser.uid) ? `<button class="btn btn-sm btn-warning" onclick="window.showCustomerModal('${c.id}')">تعديل</button>` : ''}
                </div></div></div>`).join('')}</div>
            <div class="pagination">${Array.from({length:totalPages},(_,i)=>`<button class="btn btn-sm btn-outline-primary" onclick="window.renderCustomers(${i+1},${limit})">${i+1}</button>`).join('')}</div>
        `;
        document.getElementById('searchCustomer')?.addEventListener('input', e => { const term = e.target.value.toLowerCase(); document.querySelectorAll('#customersList .col-md-4').forEach(card => { card.style.display = card.innerText.toLowerCase().includes(term) ? '' : 'none'; }); });
    } catch(e) { showToast('فشل تحميل الزبائن','error'); } finally { hideLoading(); }
}
async function showCustomerModal(id=null) {
    let cust = id ? (await getStore('customers')).find(c => c.id == id) : null;
    const wilayas = ['أدرار','الشلف','الأغواط','أم البواقي','باتنة','بجاية','بسكرة','بشار','البليدة','البويرة','تمنراست','تبسة','تلمسان','تيارت','تيزي وزو','الجزائر','الجلفة','جيجل','سطيف','سعيدة','سكيكدة','سيدي بلعباس','عنابة','قالمة','قسنطينة','المدية','ميلة','معسكر','مستغانم','المسيلة'];

async function addCustomerPayment(customerId) {
    const customers = await getStore('customers'); const cust = customers.find(c => c.id == customerId); if(!cust) return;
    let invoices = (await getStore('invoices')).filter(inv => inv.customer_id == customerId && inv.remaining_amount > 0);
    if(currentUser.role !== 'admin') invoices = invoices.filter(i => i.created_by === currentUser.uid);
    let unpaidInvoice = invoices[0];
    if(!unpaidInvoice) {
        const remainingContract = cust.total_amount - cust.paid_amount;
        if(remainingContract <= 0) { showToast('لا يوجد مبلغ متبقي','error'); return; }
        let settings = (await getStore('settings')); const nextNum = settings[0]?.invoiceCounter || 1;
        settings[0].invoiceCounter = nextNum + 1; await saveStore('settings', settings);
        const invoiceNumber = `INV-${new Date().getFullYear()}-${nextNum}`;
        const newInvoice = { id: generateUUID(), invoice_number: invoiceNumber, customer_id: cust.id, invoice_date: new Date().toISOString().slice(0,10), due_date: new Date(Date.now()+30*86400000).toISOString().slice(0,10), total_amount: remainingContract, paid_amount: 0, remaining_amount: remainingContract, discount: 0, tax_rate: 0, status: 'unpaid', notes: 'فاتورة تلقائية', invoice_type: 'officielle', created_by: currentUser.uid, created_by_name: currentUser.email, created_at: new Date().toISOString(), updated_at: new Date().toISOString() };
        let invoicesArr = await getStore('invoices'); invoicesArr.push(newInvoice); await saveStore('invoices', invoicesArr);
        let itemsArr = await getStore('invoice_items'); itemsArr.push({ id: generateUUID(), invoice_id: newInvoice.id, description: `تسديد دفعة`, quantity: 1, price: remainingContract, total: remainingContract }); await saveStore('invoice_items', itemsArr);
        unpaidInvoice = newInvoice; showToast('تم إنشاء فاتورة تلقائية','success');
    }
    const modalHtml = `<div class="modal fade" id="addPaymentModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>إضافة دفعة</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="mb-2"><strong>الفاتورة:</strong> ${escapeHtml(unpaidInvoice.invoice_number)}</div><div class="mb-2"><strong>المتبقي:</strong> ${formatCurrency(unpaidInvoice.remaining_amount)}</div><input type="number" id="paymentAmount" class="form-control mb-2" placeholder="المبلغ" max="${fromCents(unpaidInvoice.remaining_amount)}" step="1000"><input type="date" id="paymentDate" class="form-control mb-2" value="${new Date().toISOString().slice(0,10)}"><textarea id="paymentNotes" class="form-control" placeholder="ملاحظات"></textarea></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button><button class="btn btn-primary" onclick="window.saveCustomerPayment('${customerId}','${unpaidInvoice.id}')">حفظ</button></div></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml); const modal = new bootstrap.Modal(document.getElementById('addPaymentModal')); modal.show();
    document.getElementById('addPaymentModal').addEventListener('hidden.bs.modal', () => document.getElementById('addPaymentModal')?.remove());
}
async function saveCustomerPayment(customerId, invoiceId) {
    const amountVal = parseFloat(document.getElementById('paymentAmount').value); if(isNaN(amountVal) || amountVal <= 0) { showToast('المبلغ غير صحيح','error'); return; }
    const amountCents = toCents(amountVal); showLoading();
    try {
        let invoices = await getStore('invoices'); const invIndex = invoices.findIndex(i => i.id == invoiceId); if(invIndex === -1) throw new Error('الفاتورة غير موجودة'); const invoice = invoices[invIndex];
        if (amountCents > invoice.remaining_amount) throw new Error(`المبلغ أكبر من المتبقي (${formatCurrency(invoice.remaining_amount)})`);
        invoice.paid_amount += amountCents; invoice.remaining_amount = invoice.total_amount - invoice.paid_amount;
        invoice.status = invoice.paid_amount === 0 ? 'unpaid' : (invoice.paid_amount >= invoice.total_amount ? 'paid' : 'partial'); invoice.updated_at = new Date().toISOString(); invoices[invIndex] = invoice; await saveStore('invoices', invoices);
        let payments = await getStore('invoice_payments');
        payments.push({ id: generateUUID(), invoice_id: invoiceId, amount: amountCents, payment_date: document.getElementById('paymentDate').value, notes: document.getElementById('paymentNotes').value, received_by: currentUser.uid, received_by_name: currentUser.email });
        await saveStore('invoice_payments', payments); await updateCustomerTotals(customerId);
        bootstrap.Modal.getInstance(document.getElementById('addPaymentModal')).hide(); showToast('✅ تم إضافة الدفعة','success');
        document.getElementById('paymentsModal')?.remove(); showCustomerPayments(customerId);
    } catch(e) { showToast(e.message,'error'); } finally { hideLoading(); }
}
async function deletePayment(paymentId, customerId) {
    if(!confirm('هل أنت متأكد؟')) return; showLoading();
    try {
        let payments = await getStore('invoice_payments'); const payment = payments.find(p => p.id == paymentId); if(!payment) throw new Error('الدفعة غير موجودة');
        payments = payments.filter(p => p.id != paymentId); await saveStore('invoice_payments', payments);
        let invoices = await getStore('invoices'); const invIndex = invoices.findIndex(i => i.id == payment.invoice_id);
        if(invIndex !== -1) { invoices[invIndex].paid_amount -= payment.amount; invoices[invIndex].remaining_amount = invoices[invIndex].total_amount - invoices[invIndex].paid_amount; invoices[invIndex].status = invoices[invIndex].paid_amount === 0 ? 'unpaid' : (invoices[invIndex].paid_amount >= invoices[invIndex].total_amount ? 'paid' : 'partial'); invoices[invIndex].updated_at = new Date().toISOString(); await saveStore('invoices', invoices); await updateCustomerTotals(customerId); }
        showToast('🗑️ تم حذف الدفعة','success'); document.getElementById('paymentsModal')?.remove(); showCustomerPayments(customerId);
    } catch(e) { showToast(e.message,'error'); } finally { hideLoading(); }
}

l-group"><label>TVA (%)</label><input type="number" id="taxRate" class="form-control" value="19"></div><div class="control-group"><label>طريقة الدفع</label><input type="text" id="paymentMethod" class="form-control" value="تحويل بنكي / Virement bancaire / Bank transfer"></div><div class="control-group"><label>IBAN</label><input type="text" id="iban" class="form-control" value="DZ 123 456 789 01 02 123456789"></div><div class="control-group"><label>ملاحظات</label><textarea id="notes" class="form-control" rows="2">شكراً لثقتكم</textarea></div></div></div><hr><label>المنتجات / الخدمات</label><div id="invoiceItemsContainer"></div><button type="button" id="addItemBtnInvoice" class="add-item-btn"><i class="fas fa-plus-circle"></i> إضافة بند</button><div class="btn-group"><button class="btn btn-primary" id="updatePreviewBtn"><i class="fas fa-sync-alt"></i> تحديث المعاينة</button><button class="btn btn-success" id="saveInvoiceBtn"><i class="fas fa-save"></i> حفظ الفاتورة</button><button class="btn btn-danger" id="printInvoiceBtn"><i class="fas fa-print"></i> طباعة / PDF</button></div></div><div class="invoice-preview-panel"><div id="invoicePreviewContent" class="algerian-invoice"></div></div></div>`;
    document.getElementById('content').innerHTML = html;

function renderInvoiceItemsInput() { const container = document.getElementById('invoiceItemsContainer'); if(!container) return; container.innerHTML = ''; invoiceItems.forEach((item,idx)=>{ const row = document.createElement('div'); row.className = 'item-row'; row.innerHTML = `<input type="text" class="item-name" value="${escapeHtml(item.name)}" data-idx="${idx}" data-field="name" placeholder="الوصف"><input type="number" class="item-qty" value="${item.quantity}" data-idx="${idx}" data-field="quantity" step="1" min="1"><input type="number" class="item-price" value="${item.price}" data-idx="${idx}" data-field="price" step="1000"><button class="remove-item" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button>`; container.appendChild(row); }); document.querySelectorAll('.item-name, .item-qty, .item-price').forEach(inp=>{ inp.removeEventListener('change',handleItemChange); inp.addEventListener('change',handleItemChange); }); document.querySelectorAll('.remove-item').forEach(btn=>{ btn.removeEventListener('click',handleRemoveItem); btn.addEventListener('click',handleRemoveItem); }); }
function handleItemChange(e){ const idx = parseInt(e.target.dataset.idx,10), field = e.target.dataset.field; if(field==='quantity') invoiceItems[idx].quantity = parseFloat(e.target.value)||1; else if(field==='price') invoiceItems[idx].price = parseFloat(e.target.value)||0; else invoiceItems[idx].name = e.target.value; renderInvoicePreview(); }
function handleRemoveItem(e){ const idx = parseInt(e.currentTarget.dataset.idx,10); if(invoiceItems.length>1){ invoiceItems.splice(idx,1); renderInvoiceItemsInput(); renderInvoicePreview(); } else showToast("يجب أن يبقى بند واحد على الأقل","error"); }
function computeTotals(items, taxRatePercent){ const sub = items.reduce((s,it)=>s+(it.quantity*it.price),0); const tax = sub * (taxRatePercent/100); return { subTotal: sub, taxAmount: tax, total: sub+tax }; }
function getInvoiceFormData(){ return { companyNameAr: document.getElementById('companyNameAr')?.value||'', companyNameFr: document.getElementById('companyNameFr')?.value||'', legalForm: document.getElementById('legalForm')?.value||'', capital: document.getElementById('capital')?.value||'', companyNif: document.getElementById('companyNif')?.value||'', companyNis: document.getElementById('companyNis')?.value||'', companyRc: document.getElementById('companyRc')?.value||'', companyArt: document.getElementById('companyArt')?.value||'', companyPhone: document.getElementById('companyPhone')?.value||'', companyEmail: document.getElementById('companyEmail')?.value||'', companyAddr: document.getElementById('companyAddr')?.value||'', invoiceType: document.getElementById('invoiceType')?.value||'officielle', invoiceNumber: document.getElementById('invoiceNumber')?.value||'', invoiceDate: document.getElementById('invoiceDate')?.value||'', dueDate: document.getElementById('dueDate')?.value||'', clientName: document.getElementById('clientName')?.value||'', clientPhone: document.getElementById('clientPhone')?.value||'', taxRate: parseFloat(document.getElementById('taxRate')?.value)||0, paymentMethod: document.getElementById('paymentMethod')?.value||'', iban: document.getElementById('iban')?.value||'', notes: document.getElementById('notes')?.value||'', language: document.getElementById('invoiceLanguage')?.value||'ar', showQuantity: document.getElementById('showQuantityColumn')?.checked !== false }; }
function renderInvoicePreview(){ const data = getInvoiceFormData(); const t = translations[data.language]; const { subTotal, taxAmount, total } = computeTotals(invoiceItems, data.taxRate); const dateFormatted = data.invoiceDate ? new Date(data.invoiceDate).toLocaleDateString(data.language==='ar'?'ar-DZ':data.language==='fr'?'fr-FR':'en-US') : '----'; const dueFormatted = data.dueDate ? new Date(data.dueDate).toLocaleDateString(data.language==='ar'?'ar-DZ':data.language==='fr'?'fr-FR':'en-US') : '----'; const capitalHtml = data.capital ? `<span class="legal-status">${t.capital}: ${escapeHtml(data.capital)}</span>` : ''; const legalFormHtml = data.legalForm ? `<span class="legal-status">${t.legalForm}: ${escapeHtml(data.legalForm)}</span>` : ''; let clientExtra = ''; if(data.clientPhone) clientExtra += `<div><span class="client-label">📞 ${t.contact}:</span> ${escapeHtml(data.clientPhone)}</div>`; let itemsHtml = `<div class="table-responsive"><table class="items-table"><thead><tr><th>#</th><th>${t.product}</th>`; if(data.showQuantity) itemsHtml += `<th>${t.quantity}</th>`; itemsHtml += `<th>${t.unitPrice}</th><th>${t.amount}</th></tr></thead><tbody>`; invoiceItems.forEach((it,idx)=>{ const line = it.quantity * it.price; itemsHtml += `<tr><td>${idx+1}</td><td style="text-align:right;">${escapeHtml(it.name)}</td>`; if(data.showQuantity) itemsHtml += `<td>${it.quantity}</td>`; itemsHtml += `<td>${formatCurrency(toCents(it.price))}</td><td>${formatCurrency(toCents(line))}</td></tr>`; }); itemsHtml += `</tbody></table></div>`; const isOfficial = data.invoiceType === 'officielle'; const invoiceTypeText = isOfficial ? t.officialInvoice : t.proformaInvoice; let taxDisplay = ''; let totalToShow = total; if(!isOfficial) { taxDisplay = `<div class="totals-line"><strong>${t.proformaNote}</strong></div>`; totalToShow = subTotal; } else { taxDisplay = `<div class="totals-line"><strong>${t.vat} (${data.taxRate}%) :</strong> ${formatCurrency(toCents(taxAmount))}</div>`; } const localizedPayment = getLocalizedText(data.paymentMethod, data.language); const localizedNotes = getLocalizedText(data.notes, data.language); let paymentHtml = ''; if(localizedPayment || data.iban) { paymentHtml = `<div class="payment-section"><div class="payment-title"><i class="fas fa-credit-card"></i> ${t.paymentInfo}</div>`; if(localizedPayment) paymentHtml += `<div>${t.paymentMethod}: ${escapeHtml(localizedPayment)}</div>`; if(data.iban) paymentHtml += `<div>IBAN: ${escapeHtml(data.iban)}</div>`; paymentHtml += `</div>`; } const notesHtml = localizedNotes ? `<div class="footer-note" style="background:#f9f9f9; padding:10px; border-radius:12px; margin-top:10px;"><i class="fas fa-comment"></i> ${escapeHtml(localizedNotes)}</div>` : ''; const isRtl = data.language === 'ar'; const dir = isRtl ? 'rtl' : 'ltr'; const textAlign = isRtl ? 'text-align:right' : 'text-align:left'; const finalHtml = `<div dir="${dir}" style="${textAlign}"><div class="invoice-header"><div class="company-main"><div class="company-name-ar">${escapeHtml(data.companyNameAr)}</div><div class="company-name-fr">${escapeHtml(data.companyNameFr)}</div><div class="legal-status">${legalFormHtml} ${capitalHtml}</div><div class="reg-numbers"><span>NIF: ${escapeHtml(data.companyNif)}</span><span>NIS: ${escapeHtml(data.companyNis)}</span><span>RC: ${escapeHtml(data.companyRc)}</span><span>ART: ${escapeHtml(data.companyArt)}</span></div><div class="company-contact">${data.companyPhone ? `📞 ${escapeHtml(data.companyPhone)}` : ''} ${data.companyPhone && data.companyEmail ? ' | ' : ''} ${data.companyEmail ? `✉️ ${escapeHtml(data.companyEmail)}` : ''}<br>📍 ${escapeHtml(data.companyAddr)}</div></div></div><div class="invoice-type-section"><div class="invoice-type-badge">${invoiceTypeText}</div><div class="invoice-ref">${t.number}: ${escapeHtml(data.invoiceNumber)} | ${t.date}: ${dateFormatted} | ${t.dueDate}: ${dueFormatted}</div></div><div class="client-section"><div class="client-title"><i class="fas fa-user-circle"></i> ${t.client}</div><div class="client-info-grid"><div><span class="client-label">${t.name}:</span> ${escapeHtml(data.clientName)}</div>${clientExtra}</div></div>${itemsHtml}<div class="totals-section"><div class="totals-line"><strong>${t.subtotal} :</strong> ${formatCurrency(toCents(subTotal))}</div>${taxDisplay}<div class="totals-line total"><strong>${t.totalDue} :</strong> ${formatCurrency(toCents(totalToShow))}</div></div>${paymentHtml}${notesHtml}<div class="signatures"><div class="signature-box"><div>${t.companyStamp}</div><div class="signature-line">_________________</div></div><div class="signature-box"><div>${t.clientSignature}</div><div class="signature-line">_________________</div></div></div><div class="footer-note">${t.footerNote} - NIF: ${escapeHtml(data.companyNif)}</div></div>`; const previewDiv = document.getElementById('invoicePreviewContent'); if(previewDiv) previewDiv.innerHTML = finalHtml; }
async function saveInvoiceToDB(editingId=null){ const data = getInvoiceFormData(); if(!data.clientName){ showToast('الرجاء إدخال اسم الزبون','error'); return; } if(invoiceItems.length===0 || invoiceItems.every(it=>it.quantity===0||it.price===0)){ showToast('الرجاء إضافة منتج أو خدمة صالحة','error'); return; } showLoading(); try{ let customers = await getStore('customers'); let customer = customers.find(c=>c.name===data.clientName); if(!customer){ customer = { id: generateUUID(), code: 'CUST-'+Date.now(), name: data.clientName, phone: data.clientPhone||'', nif: '', nis: '', total_amount:0, paid_amount:0, total_debt:0, is_active:true, created_by: currentUser.uid, created_by_name: currentUser.email, created_at: new Date().toISOString(), updated_at: new Date().toISOString() }; customers.push(customer); await saveStore('customers', customers); } const { subTotal, taxAmount, total } = computeTotals(invoiceItems, data.taxRate); const isOfficial = data.invoiceType === 'officielle'; const finalTotal = isOfficial ? total : subTotal; let invoiceNumber = data.invoiceNumber; if (!editingId) { let settingsArr = await getStore('settings'); const nextNum = settingsArr[0]?.invoiceCounter || 1; invoiceNumber = `INV-${new Date().getFullYear()}-${nextNum}`; settingsArr[0].invoiceCounter = nextNum + 1; await saveStore('settings', settingsArr); } const invoiceData = { id: editingId || generateUUID(), invoice_number: invoiceNumber, customer_id: customer.id, invoice_date: data.invoiceDate, due_date: data.dueDate, total_amount: toCents(finalTotal), paid_amount: 0, remaining_amount: toCents(finalTotal), discount: 0, tax_rate: toCents(data.taxRate), status: 'unpaid', notes: data.notes, invoice_type: data.invoiceType, created_by: editingId ? (await getStore('invoices')).find(i=>i.id==editingId)?.created_by : currentUser.uid, created_by_name: editingId ? (await getStore('invoices')).find(i=>i.id==editingId)?.created_by_name : currentUser.email, created_at: editingId ? (await getStore('invoices')).find(i=>i.id==editingId)?.created_at : new Date().toISOString(), updated_at: new Date().toISOString() }; let invoices = await getStore('invoices'); if(editingId){ const existingInv = invoices.find(i=>i.id==editingId); if (currentUser.role !== 'admin' && existingInv.created_by !== currentUser.uid) throw new Error('غير مصرح لك بتعديل هذه الفاتورة'); invoices = invoices.filter(i=>i.id!=editingId); invoices.push(invoiceData); await saveStore('invoices', invoices); let items = await getStore('invoice_items'); items = items.filter(it=>it.invoice_id!=editingId); await saveStore('invoice_items', items); } else { invoices.push(invoiceData); await saveStore('invoices', invoices); } let itemsArr = await getStore('invoice_items'); for(let it of invoiceItems){ itemsArr.push({ id: generateUUID(), invoice_id: invoiceData.id, description: it.name, quantity: it.quantity, price: toCents(it.price), total: toCents(it.quantity*it.price) }); } await saveStore('invoice_items', itemsArr); await updateCustomerTotals(customer.id); showToast(editingId?'✅ تم تعديل الفاتورة بنجاح':'✅ تم حفظ الفاتورة بنجاح','success'); renderInvoicesList(); } catch(e){ showToast(e.message,'error'); } finally { hideLoading(); } }
async function renderInvoicesList(page=1, limit=10){ showLoading(); try{ let invoices = await getStore('invoices'); if(currentUser.role !== 'admin') invoices = invoices.filter(i=>i.created_by===currentUser.uid); const total = invoices.length, totalPages = Math.ceil(total/limit); const paginated = invoices.slice((page-1)*limit, page*limit); const customers = await getStore('customers'); document.getElementById('content').innerHTML = `<div class="d-flex justify-content-between align-items-center mb-4"><h4><i class="fas fa-list"></i> قائمة الفواتير</h4><button class="btn btn-primary" onclick="window.renderInvoices()"><i class="fas fa-plus"></i> فاتورة جديدة</button></div><div class="table-responsive"><table class="table table-hover"><thead><tr><th>رقم الفاتورة</th><th>الزبون</th><th>التاريخ</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th><th></th></tr></thead><tbody>${paginated.map(inv=>{ const cust = customers.find(c=>c.id==inv.customer_id); return `<tr><td>${escapeHtml(inv.invoice_number)}</td><td>${cust?escapeHtml(cust.name):'-'}</td><td>${escapeHtml(inv.invoice_date)}</td><td>${formatCurrency(inv.total_amount)}</td><td>${formatCurrency(inv.paid_amount)}</td><td class="text-danger">${formatCurrency(inv.remaining_amount)}</td><td><span class="badge ${inv.status==='paid'?'bg-success':inv.status==='partial'?'bg-warning':'bg-danger'}">${inv.status==='paid'?'مدفوعة':inv.status==='partial'?'مدفوعة جزئياً':'غير مدفوعة'}</span></td><td><button class="btn btn-sm btn-info" onclick="window.viewInvoiceDetail('${inv.id}')"><i class="fas fa-eye"></i></button> <button class="btn btn-sm btn-warning" onclick="window.editInvoice('${inv.id}')"><i class="fas fa-edit"></i></button> ${currentUser.role==='admin'?`<button class="btn btn-sm btn-danger" onclick="window.deleteInvoice('${inv.id}')"><i class="fas fa-trash"></i></button>`:''}</td></tr>`; }).join('')}</tbody></table></div><div class="pagination">${Array.from({length:totalPages},(_,i)=>`<button class="btn btn-sm btn-outline-primary" onclick="window.renderInvoicesList(${i+1},${limit})">${i+1}</button>`).join('')}</div>`; } catch(e){ showToast('فشل تحميل قائمة الفواتير','error'); } finally { hideLoading(); } }
async function editInvoice(id){ renderInvoices(id); }
async function deleteInvoice(id){ if(currentUser.role !== 'admin'){ showToast('هذه العملية تتطلب صلاحيات المدير','error'); return; } if(!confirm('هل أنت متأكد من حذف هذه الفاتورة؟')) return; showLoading(); try{ let items = await getStore('invoice_items'); items = items.filter(it=>it.invoice_id!=id); await saveStore('invoice_items', items); let payments = await getStore('invoice_payments'); payments = payments.filter(p=>p.invoice_id!=id); await saveStore('invoice_payments', payments); let invoices = await getStore('invoices'); const invoice = invoices.find(i=>i.id==id); if(invoice){ await updateCustomerTotals(invoice.customer_id); } invoices = invoices.filter(i=>i.id!=id); await saveStore('invoices', invoices); showToast('تم حذف الفاتورة بنجاح','success'); renderInvoicesList(); } catch(e){ showToast(e.message,'error'); } finally { hideLoading(); } }
async function viewInvoiceDetail(id){ showLoading(); try{ const inv = (await getStore('invoices')).find(i=>i.id==id); if(!inv) throw new Error('الفاتورة غير موجودة'); if (currentUser.role !== 'admin' && inv.created_by !== currentUser.uid) throw new Error('غير مصرح لك بالوصول'); const cust = (await getStore('customers')).find(c=>c.id==inv.customer_id); const payments = (await getStore('invoice_payments')).filter(p=>p.invoice_id==id); const items = (await getStore('invoice_items')).filter(i=>i.invoice_id==id); document.getElementById('content').innerHTML = `<button class="btn btn-secondary mb-3" onclick="window.renderInvoicesList()"><i class="fas fa-arrow-right"></i> رجوع</button><div class="card"><div class="card-header"><h5>تفاصيل الفاتورة: ${escapeHtml(inv.invoice_number)}</h5></div><div class="card-body"><div class="row"><div class="col-md-6"><p><strong>الزبون:</strong> ${cust?escapeHtml(cust.name):'-'}</p><p><strong>التاريخ:</strong> ${escapeHtml(inv.invoice_date)}</p><p><strong>تاريخ الاستحقاق:</strong> ${escapeHtml(inv.due_date||'-')}</p></div><div class="col-md-6"><p><strong>الإجمالي:</strong> ${formatCurrency(inv.total_amount)}</p><p><strong>المدفوع:</strong> ${formatCurrency(inv.paid_amount)}</p><p><strong>المتبقي:</strong> <span class="text-danger">${formatCurrency(inv.remaining_amount)}</span></p></div></div><hr><h6>المنتجات / الخدمات</h6><div class="table-responsive"><table class="table table-sm"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>${items.map(it=>`<tr><td>${escapeHtml(it.description||'-')}</td><td>${it.quantity}</td><td>${formatCurrency(it.price)}</td><td>${formatCurrency(it.total)}</td></tr>`).join('')}</tbody></table></div><hr><h6>سجل الدفعات</h6><div class="table-responsive"><table class="table table-sm"><thead><tr><th>التاريخ</th><th>المبلغ</th><th>ملاحظات</th></tr></thead><tbody>${payments.map(p=>`<tr><td>${escapeHtml(p.payment_date)}</td><td class="text-success">${formatCurrency(p.amount)}</td><td>${escapeHtml(p.notes||'-')}</td></tr>`).join('')}</tbody></table></div><div class="mt-3"><button class="btn btn-success" onclick="window.addCustomerPayment('${cust?.id}')"><i class="fas fa-money-bill-wave"></i> تسجيل دفعة</button> <button class="btn btn-primary" onclick="window.editInvoice('${inv.id}')"><i class="fas fa-edit"></i> تعديل الفاتورة</button></div></div></div>`; } catch(e){ showToast(e.message,'error'); } finally { hideLoading(); } }

async function showFinancialArchive() { showLoading(); try { const workers = await getStore('workers'); const advances = await getStore('worker_advances'); const overtimes = await getStore('worker_overtime'); const absences = await getStore('worker_absences'); const payrolls = await getStore('worker_payroll_invoices'); let totalAdvances = 0, totalOvertime = 0, totalAbsence = 0, totalPaid = 0, archiveData = []; for (const worker of workers) { const workerAdvances = advances.filter(a => a.worker_id == worker.id).reduce((s, a) => s + a.amount, 0); const workerOvertime = overtimes.filter(o => o.worker_id == worker.id).reduce((s, o) => s + (o.hours * (worker.hourly_rate || 0)), 0); const workerAbsence = absences.filter(a => a.worker_id == worker.id && !a.is_paid).reduce((s, a) => s + (a.days * (worker.monthly_salary / 30)), 0); const workerPayroll = payrolls.filter(p => p.worker_id == worker.id).reduce((s, p) => s + p.net_payable, 0); totalAdvances += workerAdvances; totalOvertime += workerOvertime; totalAbsence += workerAbsence; totalPaid += workerPayroll; archiveData.push({ name: worker.name, advances: workerAdvances, overtime: workerOvertime, absence: workerAbsence, paid: workerPayroll, net: workerPayroll - workerAdvances }); } const modalHtml = `<div class="modal fade" id="financialArchiveModal" tabindex="-1"><div class="modal-dialog modal-xl"><div class="modal-content"><div class="modal-header bg-primary text-white"><h5><i class="fas fa-archive"></i> الأرشيف المالي للعمال</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="row mb-4"><div class="col-md-3"><div class="card bg-info text-white"><div class="card-body"><h6>إجمالي التسبيقات</h6><h4>${formatCurrency(totalAdvances)}</h4></div></div></div><div class="col-md-3"><div class="card bg-success text-white"><div class="card-body"><h6>إجمالي الساعات الإضافية</h6><h4>${formatCurrency(totalOvertime)}</h4></div></div></div><div class="col-md-3"><div class="card bg-warning text-white"><div class="card-body"><h6>إجمالي خصم الغياب</h6><h4>${formatCurrency(totalAbsence)}</h4></div></div></div><div class="col-md-3"><div class="card bg-danger text-white"><div class="card-body"><h6>إجمالي الرواتب المدفوعة</h6><h4>${formatCurrency(totalPaid)}</h4></div></div></div></div><div class="table-responsive"><table class="table table-hover"><thead><tr><th>العامل</th><th>التسبيقات</th><th>الساعات الإضافية</th><th>خصم الغياب</th><th>الرواتب المدفوعة</th><th>الصافي</th></tr></thead><tbody>${archiveData.map(d => `<tr><td>${escapeHtml(d.name)}</td><td class="text-danger">${formatCurrency(d.advances)}</td><td class="text-success">${formatCurrency(d.overtime)}</td><td class="text-warning">${formatCurrency(d.absence)}</td><td class="text-info">${formatCurrency(d.paid)}</td><td class="text-${d.net >= 0 ? 'success' : 'danger'}">${formatCurrency(d.net)}</td></tr>`).join('')}</tbody></table></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button></div></div></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); const modal = new bootstrap.Modal(document.getElementById('financialArchiveModal')); modal.show(); document.getElementById('financialArchiveModal').addEventListener('hidden.bs.modal', () => document.getElementById('financialArchiveModal')?.remove()); } catch (e) { showToast('فشل تحميل الأرشيف: ' + e.message, 'error'); } finally { hideLoading(); } }

async function renderExpenses(page = 1, limit = 10, filterUserId = '') { showLoading(); try { let expenses = await getStore('expenses'); if (currentUser.role !== 'admin') { expenses = expenses.filter(e => e.created_by === currentUser.uid); } else if (filterUserId) { expenses = expenses.filter(e => e.created_by == filterUserId); } const total = expenses.length, totalPages = Math.ceil(total / limit); const paginated = expenses.slice((page - 1) * limit, page * limit); const categories = await getStore('expense_categories'); const customers = await getStore('customers'); const users = await getStore('users'); const userOptions = users.map(u => `<option value="${u.id}" ${filterUserId == u.id ? 'selected' : ''}>${escapeHtml(u.full_name)}</option>`).join(''); document.getElementById('content').innerHTML = `<div class="d-flex justify-content-between align-items-center mb-4"><h4><i class="fas fa-money-bill-wave"></i> المصاريف</h4><button class="btn btn-primary" onclick="window.showExpenseModal()"><i class="fas fa-plus"></i> مصروف جديد</button></div><div class="filter-bar">${currentUser.role === 'admin' ? `<select id="expenseUserFilter" class="form-control w-auto" onchange="window.renderExpenses(1,10,this.value)"><option value="">كل المستخدمين</option>${userOptions}</select>` : ''}<input type="text" id="searchExpense" class="form-control" placeholder="بحث بالبيان..."></div><div class="table-responsive"><table class="table table-hover"><thead><tr><th>البيان</th><th>التصنيف</th><th>الزبون</th><th>المبلغ</th><th>التاريخ</th><th>الصورة</th><th>المستخدم</th><th></th></tr></thead><tbody>${paginated.map(exp => { const cat = categories.find(c => c.id == exp.category_id); const cust = customers.find(c => c.id == exp.customer_id); const user = users.find(u => u.id == exp.created_by); return `<tr><td>${escapeHtml(exp.description)}</td><td><span class="category-badge" style="background:${cat?.color || '#ccc'}20; color:${cat?.color || '#000'}">${cat ? escapeHtml(cat.name) : '-'}</span></td><td>${cust ? escapeHtml(cust.name) : '-'}</td><td class="text-danger">${formatCurrency(exp.amount)}</td><td>${escapeHtml(exp.expense_date)}</td><td>${exp.receipt_image ? `<img src="${exp.receipt_image}" class="img-preview" onclick="window.open(this.src)">` : '-'}</td><td>${user ? escapeHtml(user.full_name) : '-'}</td><td><button class="btn btn-sm btn-warning" onclick="window.editExpense('${exp.id}')"><i class="fas fa-edit"></i></button> ${(currentUser.role === 'admin' || exp.created_by === currentUser.uid) ? `<button class="btn btn-sm btn-danger" onclick="window.deleteExpense('${exp.id}')"><i class="fas fa-trash"></i></button>` : ''}</td></tr>`; }).join('')}</tbody></table></div><div class="pagination">${Array.from({ length: totalPages }, (_, i) => `<button class="btn btn-sm btn-outline-primary" onclick="window.renderExpenses(${i + 1},${limit}, document.getElementById('expenseUserFilter')?.value||'')">${i + 1}</button>`).join('')}</div>`; document.getElementById('searchExpense')?.addEventListener('input', e => { const term = e.target.value.toLowerCase(); document.querySelectorAll('tbody tr').forEach(row => { row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none'; }); }); } catch (e) { showToast('فشل تحميل المصاريف', 'error'); } finally { hideLoading(); } }
async function showExpenseModal(id = null) { let expense = id ? (await getStore('expenses')).find(e => e.id == id) : null; if (id && currentUser.role !== 'admin' && expense && expense.created_by !== currentUser.uid) { showToast('غير مصرح لك بتعديل هذا المصروف', 'error'); return; } const categories = await getStore('expense_categories'); const customers = await getStore('customers'); const modalHtml = `<div class="modal fade" id="expenseModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5>${expense ? 'تعديل مصروف' : 'إضافة مصروف'}</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="text" id="expDesc" class="form-control mb-2" placeholder="البيان *" value="${expense ? escapeHtml(expense.description) : ''}"><select id="expCategory" class="form-control mb-2"><option value="">اختر التصنيف</option>${categories.map(c => `<option value="${c.id}" ${expense && expense.category_id == c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}</select><select id="expCustomer" class="form-control mb-2"><option value="">ربط بزبون (اختياري)</option>${customers.map(c => `<option value="${c.id}" ${expense && expense.customer_id == c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}</select><input type="number" id="expAmount" class="form-control mb-2" placeholder="المبلغ *" value="${expense ? fromCents(expense.amount) : ''}"><input type="date" id="expDate" class="form-control mb-2" value="${expense ? expense.expense_date : new Date().toISOString().slice(0, 10)}"><textarea id="expNotes" class="form-control mb-2" placeholder="ملاحظات">${expense ? escapeHtml(expense.notes) : ''}</textarea><label>صورة الفاتورة (اختياري)</label><input type="file" id="expReceiptImage" class="form-control mb-2" accept="image/*">${expense && expense.receipt_image ? `<img src="${expense.receipt_image}" class="img-preview mb-2">` : ''}</div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button><button class="btn btn-primary" onclick="window.saveExpense('${id || 0}')">حفظ</button></div></div></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); const modal = new bootstrap.Modal(document.getElementById('expenseModal')); modal.show(); document.getElementById('expenseModal').addEventListener('hidden.bs.modal', () => document.getElementById('expenseModal')?.remove()); }
async function saveExpense(id) { const description = document.getElementById('expDesc').value.trim(); const amountVal = parseFloat(document.getElementById('expAmount').value); if (!description || isNaN(amountVal) || amountVal <= 0) { showToast('البيان والمبلغ مطلوبان بقيمة موجبة', 'error'); return; } const amountCents = toCents(amountVal); showLoading(); try { let receiptImage = null; const fileInput = document.getElementById('expReceiptImage'); if (fileInput && fileInput.files.length) { const file = fileInput.files[0]; receiptImage = await new Promise(resolve => { const reader = new FileReader(); reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); }); } let expenses = await getStore('expenses'); if (id !== '0') { const index = expenses.findIndex(e => e.id == id); if (index === -1) throw new Error('المصروف غير موجود'); if (currentUser.role !== 'admin' && expenses[index].created_by !== currentUser.uid) throw new Error('غير مصرح لك بتعديل هذا المصروف'); expenses[index].description = description; expenses[index].category_id = document.getElementById('expCategory').value || null; expenses[index].customer_id = document.getElementById('expCustomer').value || null; expenses[index].amount = amountCents; expenses[index].expense_date = document.getElementById('expDate').value; expenses[index].notes = document.getElementById('expNotes').value; if (receiptImage) expenses[index].receipt_image = receiptImage; expenses[index].updated_at = new Date().toISOString(); await saveStore('expenses', expenses); showToast('تم تعديل المصروف', 'success'); } else { const newExpense = { id: generateUUID(), description, category_id: document.getElementById('expCategory').value || null, customer_id: document.getElementById('expCustomer').value || null, amount: amountCents, expense_date: document.getElementById('expDate').value, notes: document.getElementById('expNotes').value, receipt_image: receiptImage, created_by: currentUser.uid, created_by_name: currentUser.email, created_at: new Date().toISOString(), updated_at: new Date().toISOString() }; expenses.push(newExpense); await saveStore('expenses', expenses); showToast('✅ تم إضافة المصروف', 'success'); } bootstrap.Modal.getInstance(document.getElementById('expenseModal')).hide(); renderExpenses(); } catch (e) { showToast(e.message, 'error'); } finally { hideLoading(); } }
async function editExpense(id) { showExpenseModal(id); }
async function deleteExpense(id) { if (currentUser.role !== 'admin') { showToast('هذه العملية تتطلب صلاحيات المدير', 'error'); return; } if (!confirm('هل أنت متأكد من حذف هذا المصروف؟')) return; showLoading(); try { let expenses = await getStore('expenses'); expenses = expenses.filter(e => e.id != id); await saveStore('expenses', expenses); showToast('تم حذف المصروف', 'success'); renderExpenses(); } catch (e) { showToast(e.message, 'error'); } finally { hideLoading(); } }

async function renderSync(){ document.getElementById('content').innerHTML = `<div class="card"><div class="card-header"><h5>المزامنة</h5></div><div class="card-body"><button class="btn btn-primary w-100 mb-2" onclick="window.exportAllData()">تصدير البيانات</button><button class="btn btn-success w-100" onclick="window.importData()">استيراد بيانات</button></div></div>`; }
async function exportAllData(){ showLoading(); try{ const data = {}; const cols = ['customers','invoices','invoice_items','invoice_payments','expenses','expense_categories','settings','workshop_debts','workers','worker_advances','worker_overtime','worker_absences','worker_payroll_invoices','users']; for(let c of cols) data[c] = await getStore(c); const blob = new Blob([JSON.stringify(data)],{type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `sovazi_backup_${new Date().toISOString()}.json`; a.click(); showToast('تم التصدير','success'); } catch(e){ showToast('فشل التصدير','error'); } finally { hideLoading(); } }
function importData(){ const input = document.createElement('input'); input.type='file'; input.accept='.json'; input.onchange = async (e)=>{ const file = e.target.files[0]; if(!file) return; showLoading(); try{ const text = await file.text(); const data = JSON.parse(text); for(let key in data){ if(data[key]) await saveStore(key, data[key]); } showToast('تم الاستيراد','success'); loadPage('dashboard'); } catch(err){ showToast('خطأ في الاستيراد','error'); } finally { hideLoading(); } }; input.click(); }
async function renderSettings(){ showLoading(); try{ const settings = (await getStore('settings'))[0] || {}; const categories = await getStore('expense_categories'); const users = await getStore('users'); document.getElementById('content').innerHTML = `<div class="card mb-3"><div class="card-header"><h5>إعدادات المؤسسة</h5></div><div class="card-body"><input type="text" id="setCompanyNameAr" class="form-control mb-2" value="${escapeHtml(settings.companyNameAr||'')}" placeholder="اسم المؤسسة"><input type="text" id="setCompanyPhone" class="form-control mb-2" value="${escapeHtml(settings.companyPhone||'')}" placeholder="الهاتف"><button class="btn btn-primary" onclick="window.saveCompanySettings()">حفظ</button></div></div><div class="card"><div class="card-header d-flex justify-content-between"><h5>تصنيفات المصروف</h5><button class="btn btn-sm btn-primary" onclick="window.showCategoryModal()">إضافة</button></div><div class="card-body">${categories.map(c=>`<span class="badge m-1" style="background:${c.color}">${escapeHtml(c.name)}</span>`).join('')}</div></div>${currentUser.role==='admin'?`<div class="card mt-3"><div class="card-header d-flex justify-content-between"><h5>المستخدمين</h5><button class="btn btn-sm btn-primary" onclick="window.showUserModal()">مستخدم جديد</button></div><div class="card-body"><table class="table"><thead><tr><th>البريد</th><th>الاسم</th><th>الدور</th><th></th></tr></thead><tbody>${users.map(u=>`<tr><td>${escapeHtml(u.email)}</td><td>${escapeHtml(u.full_name)}</td><td>${u.role==='admin'?'مدير':'شريك'}</td><td><button class="btn btn-sm btn-danger" onclick="window.deleteUser('${u.id}')"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div></div>`:''}`; } catch(e){ showToast('فشل تحميل الإعدادات','error'); } finally { hideLoading(); } }
async function saveCompanySettings(){ showLoading(); try{ let settingsArr = await getStore('settings'); let settings = settingsArr[0] || { id: 'settings' }; settings.companyNameAr = document.getElementById('setCompanyNameAr').value; settings.companyPhone = document.getElementById('setCompanyPhone').value; if(settingsArr.length===0) settingsArr.push(settings); else settingsArr[0] = settings; await saveStore('settings', settingsArr); updateTopBarCompanyName(); showToast('تم الحفظ','success'); } catch(e){ showToast(e.message,'error'); } finally { hideLoading(); } }
async function showCategoryModal(){ const modalHtml = `<div class="modal fade" id="catModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>تصنيف جديد</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="text" id="catName" class="form-control mb-2" placeholder="اسم التصنيف"><input type="color" id="catColor" class="form-control mb-2" value="#1e3a5f"></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button><button class="btn btn-primary" onclick="window.saveCategory()">حفظ</button></div></div></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); new bootstrap.Modal(document.getElementById('catModal')).show(); }
async function saveCategory(){ const name = document.getElementById('catName').value.trim(); if(!name) return; showLoading(); try{ let cats = await getStore('expense_categories'); cats.push({ id: generateUUID(), name, color: document.getElementById('catColor').value }); await saveStore('expense_categories', cats); bootstrap.Modal.getInstance(document.getElementById('catModal')).hide(); renderSettings(); showToast('تمت الإضافة','success'); } catch(e){ showToast(e.message,'error'); } finally { hideLoading(); } }
async function showUserModal(){ const modalHtml = `<div class="modal fade" id="userModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>مستخدم جديد</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="email" id="userEmail" class="form-control mb-2" placeholder="البريد"><input type="text" id="userFullName" class="form-control mb-2" placeholder="الاسم الكامل"><input type="password" id="userPass" class="form-control mb-2" placeholder="كلمة المرور"><select id="userRole" class="form-control mb-2"><option value="admin">مدير</option><option value="partner">شريك</option></select></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button><button class="btn btn-primary" onclick="window.saveUser()">حفظ</button></div></div></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); new bootstrap.Modal(document.getElementById('userModal')).show(); }
async function saveUser(){ const email = document.getElementById('userEmail').value.trim(); const pass = document.getElementById('userPass').value; const fullName = document.getElementById('userFullName').value.trim(); const role = document.getElementById('userRole').value; if(!email||!pass||!fullName){ showToast('جميع الحقول مطلوبة','error'); return; } showLoading(); try{ const cred = await auth.createUserWithEmailAndPassword(email, pass); await db.collection('users').doc(cred.user.uid).set({ id: cred.user.uid, email, full_name: fullName, role, is_active: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); bootstrap.Modal.getInstance(document.getElementById('userModal')).hide(); renderSettings(); showToast('تم إضافة المستخدم','success'); } catch(e){ showToast(e.message,'error'); } finally { hideLoading(); } }
async function deleteUser(id){ if(!confirm('حذف المستخدم؟')) return; showLoading(); try{ await db.collection('users').doc(id).delete(); renderSettings(); showToast('تم الحذف','success'); } catch(e){ showToast(e.message,'error'); } finally { hideLoading(); } }

async function renderDashboard(){ showLoading(); try{ let customers = await getStore('customers'); let invoices = await getStore('invoices'); let expenses = await getStore('expenses'); if(currentUser.role !== 'admin'){ customers = customers.filter(c=>c.created_by===currentUser.uid); invoices = invoices.filter(i=>i.created_by===currentUser.uid); expenses = expenses.filter(e=>e.created_by===currentUser.uid); } const totalRevenue = invoices.reduce((s,i)=>s+i.paid_amount,0); const totalExpense = expenses.reduce((s,e)=>s+e.amount,0); const profit = totalRevenue - totalExpense; document.getElementById('content').innerHTML = `<div class="row"><div class="col-md-4"><div class="card stat-card primary"><div class="card-body"><h6>الزبائن</h6><h3>${customers.length}</h3></div></div></div><div class="col-md-4"><div class="card stat-card success"><div class="card-body"><h6>الإيرادات</h6><h3>${formatCurrency(totalRevenue)}</h3></div></div></div><div class="col-md-4"><div class="card stat-card danger"><div class="card-body"><h6>المصاريف</h6><h3>${formatCurrency(totalExpense)}</h3></div></div></div><div class="col-md-4"><div class="card stat-card warning"><div class="card-body"><h6>صافي الربح</h6><h3>${formatCurrency(profit)}</h3></div></div></div></div>`; } catch(e){ showToast('فشل تحميل لوحة التحكم','error'); } finally { hideLoading(); } }

window.exportAllData=exportAllData; window.importData=importData;
window.saveCompanySettings=saveCompanySettings; window.showCategoryModal=showCategoryModal; window.saveCategory=saveCategory;
window.showUserModal=showUserModal; window.saveUser=saveUser; window.deleteUser=deleteUser;

// ================== EVENT LISTENERS ==================
document.getElementById('menuToggle').addEventListener('click', e=>{ e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); });
document.addEventListener('click', e=>{ const sb=document.getElementById('sidebar'); const tg=document.getElementById('menuToggle'); if(sb.classList.contains('open') && !sb.contains(e.target) && e.target!==tg && !tg.contains(e.target)) sb.classList.remove('open'); });
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('darkModeToggle').addEventListener('click', async ()=>{ document.body.classList.toggle('dark-mode'); const s = await getStore('settings'); if(s.length){ s[0].darkMode = document.body.classList.contains('dark-mode'); await saveStore('settings', s); } });
document.querySelectorAll('.sidebar a').forEach(l=>{ l.addEventListener('click', e=>{ e.preventDefault(); const p = l.dataset.page; if(p) loadPage(p); }); });

// بدء التشغيل
setupFirebase();
</script>
